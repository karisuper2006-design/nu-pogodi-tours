<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a3a2a"/>
      <stop offset="50%" style="stop-color:#0d5e3a"/>
      <stop offset="100%" style="stop-color:#0a8f5a"/>
    </linearGradient>
    <linearGradient id="mountain" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#c8e6d0"/>
    </linearGradient>
    <linearGradient id="sun" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffd700"/>
      <stop offset="100%" style="stop-color:#ff9500"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="256" cy="256" r="250" fill="url(#bg)"/>
  <circle cx="256" cy="256" r="235" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="3"/>
  
  <!-- Sun/compass -->
  <circle cx="256" cy="160" r="45" fill="url(#sun)" opacity="0.9"/>
  <circle cx="256" cy="160" r="35" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="2"/>
  
  <!-- Sun rays -->
  <g stroke="#ffd700" stroke-width="3" opacity="0.6">
    <line x1="256" y1="105" x2="256" y2="90"/>
    <line x1="256" y1="215" x2="256" y2="230"/>
    <line x1="201" y1="160" x2="186" y2="160"/>
    <line x1="311" y1="160" x2="326" y2="160"/>
    <line x1="217" y1="121" x2="207" y2="111"/>
    <line x1="295" y1="121" x2="305" y2="111"/>
    <line x1="217" y1="199" x2="207" y2="209"/>
    <line x1="295" y1="199" x2="305" y2="209"/>
  </g>
  
  <!-- Mountains -->
  <polygon points="80,400 200,220 320,400" fill="url(#mountain)" opacity="0.9"/>
  <polygon points="190,400 310,240 430,400" fill="white" opacity="0.75"/>
  
  <!-- Snow caps -->
  <polygon points="200,220 175,260 225,260" fill="white" opacity="0.95"/>
  <polygon points="310,240 290,272 330,272" fill="white" opacity="0.95"/>
  
  <!-- Wolf paw print -->
  <g transform="translate(256, 430)" fill="rgba(255,215,0,0.85)">
    <!-- Main pad -->
    <ellipse cx="0" cy="0" rx="28" ry="22"/>
    <!-- Toes -->
    <circle cx="-22" cy="-22" r="11"/>
    <circle cx="-6" cy="-30" r="11"/>
    <circle cx="10" cy="-30" r="11"/>
    <circle cx="26" cy="-22" r="11"/>
  </g>
</svg>
